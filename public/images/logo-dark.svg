<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 36" height="36">
  <!-- Icon bg -->
  <rect width="36" height="36" rx="8" fill="#FFD90F"/>

  <!-- Hair spikes -->
  <polygon points="8,11 10,3 14,10 18,2 22,10 26,3 28,11" fill="#FFD90F" stroke="#C9A200" stroke-width="0.7" stroke-linejoin="round"/>

  <!-- Eyes -->
  <ellipse cx="13" cy="16" rx="4" ry="4.5" fill="white"/>
  <ellipse cx="23" cy="16" rx="4" ry="4.5" fill="white"/>
  <circle cx="14.2" cy="17" r="2" fill="#1a1a1a"/>
  <circle cx="24.2" cy="17" r="2" fill="#1a1a1a"/>

  <!-- Nose -->
  <ellipse cx="18" cy="21.5" rx="2.2" ry="1.4" fill="#E8BE00"/>

  <!-- Mouth + overbite teeth -->

  <rect x="14.5" y="25" width="7" height="2.8" rx="0.3" fill="white"/>

  <!-- Shirt -->
  <path d="M5 31 Q18 34 31 31 L31 36 L5 36 Z" fill="#7ECFCF"/>

  <!-- Text -->
  <text x="44" y="16" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="800" letter-spacing="0.3" fill="#FFD90F" stroke="#A07800" stroke-width="0.3">Ralph</text>
  <text x="44" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="800" letter-spacing="0.3" fill="#E2E8F0">Grip</text>
</svg>
